<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

<title>HK NEO+ Sterilizer (Mobile)</title>
<style>
  html, body {
    margin: 0; padding: 0; overflow: hidden; height: 100%;
    background: #000;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    overscroll-behavior: none;
    touch-action: pan-y;
  }
  /* iOS Safari full-screen */
  body { height: 100vh; height: 100dvh; }
  /* ✨ v78.144 — 사용자 락인: brightness 1.20, blur 4px, opacity 0.35. */
  #splat-bg {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; display: block;
    filter: brightness(1.20) saturate(0.6) blur(4px) !important;
    -webkit-filter: brightness(1.20) saturate(0.6) blur(4px) !important;
    opacity: 0.35 !important;
  }
  #splat-bg canvas { display: block; width: 100% !important; height: 100% !important; }
  /* HK iframe 앞, transparent */
  /* ✨ v78.016 — 데스크탑에서도 모바일 레이아웃 시뮬레이션을 위해 iframe 폭 강제 좁게.
     실제 모바일 디바이스 (max-width 414) 에서는 100vw 와 동일 효과. */
  #hk-frame {
    position: fixed;
    top: 0; bottom: 0;
    left: 50%; transform: translateX(-50%);
    width: 100vw; max-width: 414px;
    height: 100vh; height: 100dvh;
    border: none; background: transparent; z-index: 1;
    /* iOS notch 대응 */
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    box-sizing: border-box;
    /* ✨ v78.124 — v78.123 iframe filter revert (사용자: cabinet 도 같이 어두워졌음). splat 만 따로 darken 필요. */
  }
  /* 데스크탑에서 좌우 빈 공간 dark backdrop (모바일 frame 효과) */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse at center, #1a1f2e 0%, #050810 100%);
  }
  /* splat 도 iframe 과 동일 폭 */
  #splat-bg {
    position: fixed; top: 0; bottom: 0;
    left: 50%; transform: translateX(-50%);
    width: 100vw; max-width: 414px;
    height: 100vh; height: 100dvh;
    z-index: 0; pointer-events: none;
  }
  /* ✨ v78.164 — 로딩창 재디자인 + 제품 특징 carousel. */
  #mobileLoading {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, #0f1626 0%, #050810 80%);
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    opacity: 1; transition: opacity 0.5s ease-out;
    padding: 0 32px; text-align: center;
  }
  #mobileLoading.fade { opacity: 0; pointer-events: none; }
  /* 브랜드 */
  #mobileLoading .brand {
    font-size: 13px; letter-spacing: 4px; opacity: 0.55; margin-bottom: 8px;
    text-transform: uppercase; font-weight: 500;
  }
  #mobileLoading .product {
    font-size: 28px; font-weight: 700; letter-spacing: 1px;
    background: linear-gradient(135deg, #ffffff 0%, #7ab8ff 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 36px;
  }
  /* 특징 carousel */
  #mobileLoading .feature-stage {
    width: 100%; max-width: 320px;
    height: 92px; position: relative;
    margin-bottom: 28px;
  }
  #mobileLoading .feature {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    opacity: 0; transform: translateY(10px);
    transition: opacity 0.5s ease-out, transform 0.5s ease-out;
  }
  #mobileLoading .feature.active { opacity: 1; transform: translateY(0); }
  #mobileLoading .feature-icon {
    width: 36px; height: 36px; margin-bottom: 10px;
    fill: none; stroke: #7ab8ff; stroke-width: 1.5;
    stroke-linecap: round; stroke-linejoin: round;
  }
  #mobileLoading .feature-title {
    font-size: 15px; font-weight: 600; letter-spacing: 0.5px; color: #e8eef7;
    margin-bottom: 4px;
  }
  #mobileLoading .feature-desc {
    font-size: 11px; opacity: 0.6; letter-spacing: 0.3px; line-height: 1.4;
    max-width: 280px;
  }
  /* 진행 dots */
  #mobileLoading .progress-dots {
    display: flex; gap: 5px; margin-bottom: 10px;
  }
  #mobileLoading .pdot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(122,184,255,0.25);
    transition: background 0.3s ease, transform 0.3s ease;
  }
  #mobileLoading .pdot.on {
    background: #7ab8ff;
    transform: scale(1.3);
  }
  /* loading 텍스트 (작게) */
  #mobileLoading .loading-label {
    font-size: 10px; letter-spacing: 2.5px; opacity: 0.4;
    text-transform: uppercase; font-weight: 500;
  }
  /* ✨ v78.151 — FPS HUD (좌상단 작은 표시, 사용자 확인용). */
  #fpsHud {
    position: fixed; top: 8px; left: 8px; z-index: 99999;
    background: rgba(0,0,0,0.55); color: #fff;
    font: 600 11px/1.2 monospace, -apple-system, sans-serif;
    padding: 5px 8px; border-radius: 6px;
    border: 1px solid rgba(102,170,255,0.35);
    pointer-events: none;
    letter-spacing: 0.3px;
  }
  #fpsHud .lbl { opacity: 0.55; font-weight: 400; }
  #fpsHud .v { color: #7ab8ff; }
</style>

</div>
<script>
// ✨ v78.164 — 로딩창 제품 특징 carousel.
(function(){
  const FEATURES = [
    { title: 'UV-C Sterilization', desc: '강력한 UV-C 살균으로 세균 99.9% 제거',
      svg: '<svg class="feature-icon" viewBox="0 0 32 32"><circle cx="16" cy="16" r="11"/><path d="M16 7v4M16 21v4M7 16h4M21 16h4M10 10l2.5 2.5M19.5 19.5L22 22M10 22l2.5-2.5M19.5 12.5L22 10"/></svg>' },
    { title: 'Ion Generator', desc: '+/− 이온 분사로 공기 중 유해물질 분해',
      svg: '<svg class="feature-icon" viewBox="0 0 32 32"><circle cx="16" cy="16" r="3"/><circle cx="16" cy="16" r="9"/><circle cx="16" cy="16" r="13"/><path d="M11 16h2M19 16h2M16 11v2M16 19v2"/></svg>' },
    { title: 'LED Display', desc: '실시간 살균 상태 + 시스템 정보 표시',
      svg: '<svg class="feature-icon" viewBox="0 0 32 32"><rect x="5" y="7" width="22" height="14" rx="2"/><path d="M11 26h10M16 21v5"/><circle cx="11" cy="14" r="1.5"/><path d="M16 11h7"/></svg>' },
    { title: 'Drying System', desc: '살균 후 자동 건조로 위생 완성',
      svg: '<svg class="feature-icon" viewBox="0 0 32 32"><path d="M8 14c0-3 2-5 4-5s2 2 4 2 4-3 6-3"/><path d="M8 20c0-3 2-5 4-5s2 2 4 2 4-3 6-3"/><path d="M8 26c0-3 2-5 4-5s2 2 4 2 4-3 6-3"/></svg>' },
    { title: 'Modular Design', desc: '확장 가능한 모듈식 구조로 맞춤 설정',
      svg: '<svg class="feature-icon" viewBox="0 0 32 32"><rect x="5" y="5" width="9" height="9" rx="1"/><rect x="18" y="5" width="9" height="9" rx="1"/><rect x="5" y="18" width="9" height="9" rx="1"/><rect x="18" y="18" width="9" height="9" rx="1"/></svg>' },
    { title: 'Premium Stainless', desc: 'SUS 304 스테인리스 — 내식성과 위생성',
      svg: '<svg class="feature-icon" viewBox="0 0 32 32"><path d="M16 3l11 5v6c0 7-5 12-11 13-6-1-11-6-11-13V8z"/><path d="M12 16l3 3 6-6"/></svg>' },
  ];

  const stage = document.getElementById('mlFeatureStage');
  const dotsBox = document.getElementById('mlProgressDots');
  if (!stage || !dotsBox) return;

  FEATURES.forEach((f, i) => {
    const el = document.createElement('div');
    el.className = 'feature' + (i === 0 ? ' active' : '');
    el.innerHTML = f.svg
      + '<div class="feature-title">' + f.title + '</div>'
      + '<div class="feature-desc">' + f.desc + '</div>';
    stage.appendChild(el);

    const d = document.createElement('div');
    d.className = 'pdot' + (i === 0 ? ' on' : '');
    dotsBox.appendChild(d);
  });

  const els = stage.querySelectorAll('.feature');
  const dots = dotsBox.querySelectorAll('.pdot');
  let idx = 0;
  setInterval(() => {
    els[idx].classList.remove('active');
    dots[idx].classList.remove('on');
    idx = (idx + 1) % FEATURES.length;
    els[idx].classList.add('active');
    dots[idx].classList.add('on');
  }, 1800);
})();
</script>

<div id="splat-bg"></div>
<iframe id="hk-frame" src="" allow="fullscreen"></iframe>
<!-- ✨ v78.151 — FPS HUD. splat (parent) + iframe (cabinet) 둘 다 표시. -->
<div id="fpsHud"><span class="lbl">FPS</span> <span class="v" id="fpsSplat">--</span> · <span class="lbl">cab</span> <span class="v" id="fpsCab">--</span></div>

<script>
// ✨ Mobile 진입점 — HK iframe 으로 mobile=1 query 전달
document.getElementById('hk-frame').src = './HK_3dconfigurator_final.html?splat=1&mobile=1&_=' + Date.now();

// ✨ v78.086 — loading overlay 를 splat 다운로드 완료까지 유지 (이전: iframe load 후 2.5초)
//   이유: splat 60MB 다운로드가 인트로 시작 후에 진행되어 사용자가 검은 배경에서 splat 점진적 등장을 봄.
//   해결: splat 100% 다운로드 완료 → loading fade. window._splatReadyToFade 가 신호.
window._splatReadyToFade = false;
// ✨ v78.167 — 검은 화면 진짜 제거: iframe 의 intro 가 실제로 첫 frame 렌더한 후에만 fade.
//   이전 v78.166: _introStarted (callback 호출 시점) 으론 부족 — camera/HDRI 적용 전 → 검은 화면.
//   현재: _introRenderReady (6 frame render 후 신호) 만 fade trigger. 안전망 15s.
window._mobileLoadingStartT = performance.now();
window._checkFadeLoading = function() {
  const _introRendered = (() => {
    try {
      const hk = document.getElementById('hk-frame');
      return !!(hk && hk.contentWindow && hk.contentWindow._introRenderReady);
    } catch(e) { return false; }
  })();
  if (_introRendered) {
    const elapsed = performance.now() - (window._mobileLoadingStartT || 0);
    const MIN_SHOW = 1500;   // 최소 1.5초 노출 (carousel)
    const remain = Math.max(0, MIN_SHOW - elapsed);
    setTimeout(() => {
      const el = document.getElementById('mobileLoading');
      if (el) el.classList.add('fade');
    }, remain);
  }
};
// ✨ v78.167 — _introRenderReady polling 안전망 + 15s 강제 fade (실패 케이스 대응).
setInterval(() => {
  if (document.getElementById('mobileLoading')?.classList.contains('fade')) return;
  try {
    const hk = document.getElementById('hk-frame');
    if (hk && hk.contentWindow && hk.contentWindow._introRenderReady) {
      window._checkFadeLoading();
    }
  } catch(e) {}
}, 150);
// 안전망: 15초 안에 fade 가 발동되지 않으면 강제 fade (splat fetch 실패 시).
// ✨ v78.150 — 30초 → 15초 (사용자 요청: 로딩 시간 단축).
setTimeout(() => {
  const el = document.getElementById('mobileLoading');
  if (el && !el.classList.contains('fade')) {
    el.classList.add('fade');
    console.warn('[v78.150] 15 초 안전망 발동 → loading 강제 hide');
  }
}, 15000);
document.getElementById('hk-frame').addEventListener('load', () => {
  window._iframeLoaded = true;
  window._checkFadeLoading();
});

// 모바일 핀치줌 차단 (touchmove)
document.addEventListener('touchmove', (e) => {
  if (e.touches.length > 1) e.preventDefault();
}, { passive: false });

// iOS bounce scroll 차단
document.addEventListener('touchmove', (e) => {
  if (e.target === document.body) e.preventDefault();
}, { passive: false });

// 방향 변경 시 viewport 재계산 트리거
window.addEventListener('orientationchange', () => {
  setTimeout(() => {
    const ifr = document.getElementById('hk-frame');
    if (ifr.contentWindow) {
      try { ifr.contentWindow.dispatchEvent(new Event('resize')); } catch(e) {}
    }
  }, 300);
});
</script>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
    "@sparkjsdev/spark": "https://cdn.jsdelivr.net/npm/@sparkjsdev/spark@latest/dist/spark.module.js"
  }
}

<script type="module">
import * as THREE from 'three';
import * as GaussianSplats3D from '@sparkjsdev/spark';

const { SparkRenderer, SplatMesh } = GaussianSplats3D;
const DEG = Math.PI / 180;
const isMobile = /android|iphone|ipad|ipod|mobile/i.test(navigator.userAgent);

// ─── Splat scene (HK iframe과 별도) ───
const splatScene = new THREE.Scene();
const splatCamera = new THREE.PerspectiveCamera(35, innerWidth/innerHeight, 0.05, 200);
const splatRenderer = new THREE.WebGLRenderer({ antialias: !isMobile, powerPreference: 'low-power' });
// ✨ v78.129 — 모바일 splat pixelRatio 0.5 (사용자 요청). DoF 블러 의도와 부합 (배경은 어차피 blur).
//   fillrate: dpr 1.5 → 0.5 = 9배 가벼움. 카메라 움직임 시 추가로 0.25 로 동적 감소.
splatRenderer.setPixelRatio(Math.min(devicePixelRatio, isMobile ? 0.5 : 2));
window._splatRenderer = splatRenderer;   // 동적 컨트롤용 노출
splatRenderer.setSize(innerWidth, innerHeight);
splatRenderer.outputColorSpace = THREE.SRGBColorSpace;
splatRenderer.toneMapping = THREE.NoToneMapping;
splatRenderer.toneMappingExposure = 0.88;
document.getElementById('splat-bg').appendChild(splatRenderer.domElement);

const sparkRenderer = new SparkRenderer({ renderer: splatRenderer });
splatScene.add(sparkRenderer);

let splatMesh = null;
// ✨ v78.134 — 모바일 전용 1MB splat (PC 는 7MB .spz 유지). 별도 파일로 분리.
const SPLAT_URL = './Immaculate Commercial Kitchen Space.mobile.spz';
// ✨ v78.128 — v78.126 splat 스킵 revert. splat 다시 살림.
loadSplat();
async function loadSplat() {
  console.log('[mobile] Splat 로드 시작:', SPLAT_URL);
  try {
    const response = await fetch(SPLAT_URL);
    if (!response.ok) throw new Error('fetch failed: ' + response.status);
    const contentLength = +response.headers.get('Content-Length') || 60000000;
    const reader = response.body.getReader();
    let received = 0;
    const chunks = [];
    const _progressEl = document.querySelector('#mobileLoading .label');
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
      received += value.length;
      const pct = Math.min(99, Math.round((received / contentLength) * 100));
      if (_progressEl) _progressEl.innerHTML = `HK NEO+ STERILIZER<br>Loading ${pct}%`;
    }
    if (_progressEl) _progressEl.innerHTML = `HK NEO+ STERILIZER<br>Loading 100%`;
    console.log('[v78.086] Splat fetch 완료:', received, 'bytes');
  } catch (e) {
    console.warn('[v78.086] Splat fetch progress 실패 (SplatMesh 가 다시 시도):', e);
  }
  // SplatMesh 생성 — fetch 가 끝나면 브라우저 캐시에서 즉시 로드.
  splatMesh = new SplatMesh({ url: SPLAT_URL });
  splatMesh.rotation.x = 0;
  splatMesh.rotation.y = 90 * DEG;
  splatMesh.rotation.z = 0;
  splatMesh.position.set(3.5, -0.2, -0.1);
  splatMesh.scale.set(1.91, 1.91, 1.91);
  splatScene.add(splatMesh);
  window.splatMesh = splatMesh;
  // ✨ v78.086 — splat ready 신호. _checkFadeLoading 호출해서 iframe 도 ready 면 fade.
  window._splatReadyToFade = true;
  if (typeof _checkFadeLoading === 'function') _checkFadeLoading();
}
// ✨ v78.114 — loadSplat() 중복 호출 제거 (이전: line 175 + 여기 line 212 두 번 호출 → 16MB fetch 2배 + SplatMesh 2개 race condition).
//              사용자 보고: "모바일에서 랜덤 무한로딩/흰화면/정상 = 랜덤" → 이 race condition 이 원인.

// ─── HK iframe 카메라 sync ───
const hkFrame = document.getElementById('hk-frame');
let hkWindow = null;

hkFrame.addEventListener('load', () => {
  hkWindow = hkFrame.contentWindow;
  console.log('[mobile] HK iframe loaded.');
  let bgLocked = false, sphereLocked = false, floorLocked = false;
  const poll = () => {
    if (!hkWindow || !hkWindow.scene || !hkWindow.camera) { setTimeout(poll, 200); return; }
    if (!bgLocked) {
      try {
        Object.defineProperty(hkWindow.scene, 'background', {
          get() { return null; }, set(v) {}, configurable: true
        });
        bgLocked = true;
      } catch(e) {}
    }
    if (!sphereLocked && hkWindow._hdriSphere) {
      try {
        Object.defineProperty(hkWindow._hdriSphere, 'visible', {
          get() { return false; }, set(v) {}, configurable: true
        });
        sphereLocked = true;
      } catch(e) {}
    }
    if (!floorLocked && hkWindow._plainFloor) {
      try {
        Object.defineProperty(hkWindow._plainFloor, 'visible', {
          get() { return false; }, set(v) {}, configurable: true
        });
        floorLocked = true;
      } catch(e) {}
    }
    if (hkWindow._bgEnforceRaf) {
      try { hkWindow.cancelAnimationFrame(hkWindow._bgEnforceRaf); hkWindow._bgEnforceRaf = -1; } catch(e) {}
    }
    if (!bgLocked || !sphereLocked || !floorLocked) setTimeout(poll, 200);
  };
  poll();
});

window.addEventListener('resize', () => {
  splatCamera.aspect = innerWidth / innerHeight;
  splatCamera.updateProjectionMatrix();
  splatRenderer.setSize(innerWidth, innerHeight);
});

// ─── Splat 자체 RAF + v78.129 동적 품질 컨트롤 ───
//   1) 카메라 움직임 시 pixelRatio 0.25 (절반의 절반), 정지 300ms 후 0.5 복원
//   2) FPS < 25 면 0.25 영구 락 / FPS > 45 면 0.5 복원 (어댑티브)
// ✨ v78.162 — 사용자 6fps 보고 → splat dpr 0.25 영구 (mobile). GPU 부하 추가 절반.
const _SPLAT_DPR_IDLE   = isMobile ? 0.25 : 1.0;
const _SPLAT_DPR_MOVING = isMobile ? 0.18 : 0.75;
const _SPLAT_DPR_LOW    = isMobile ? 0.18 : 0.5;
let _splatLastMoveT = 0;
let _splatLastPos = new THREE.Vector3();
let _splatLastFps = 60;
let _splatFrameCounter = 0;
let _splatFrameLastSampleT = performance.now();
let _splatCurDpr = _SPLAT_DPR_IDLE;
let _splatAdaptiveLowLock = false;   // FPS 매우 낮으면 영구 low
function _splatSetDpr(target) {
  if (Math.abs(_splatCurDpr - target) < 0.001) return;
  _splatCurDpr = target;
  splatRenderer.setPixelRatio(target);
  splatRenderer.setSize(innerWidth, innerHeight);
}
// ✨ v78.145 — 모바일에서 parent splat loop 30fps cap. iframe 30fps 와 동기화.
//   이전: parent 60fps + iframe 30fps → GPU 경쟁 + 잔렉. now: 둘 다 30fps.
const _SPLAT_TARGET_FRAME_MS = isMobile ? (1000 / 30) : (1000 / 60);
let _splatPrevFrameTime = performance.now();
function animate() {
  requestAnimationFrame(animate);
  if (document.hidden) return;
  const now = performance.now();
  // ✨ v78.145 — frame cap (모바일 30fps)
  if (now - _splatPrevFrameTime < _SPLAT_TARGET_FRAME_MS - 1) return;
  _splatPrevFrameTime = now;
  // === FPS 측정 (1초 단위) ===
  _splatFrameCounter++;
  if (now - _splatFrameLastSampleT >= 1000) {
    _splatLastFps = (_splatFrameCounter * 1000) / (now - _splatFrameLastSampleT);
    _splatFrameCounter = 0;
    _splatFrameLastSampleT = now;
    // ✨ v78.151 — FPS HUD 업데이트.
    try {
      const sEl = document.getElementById('fpsSplat');
      if (sEl) sEl.textContent = _splatLastFps.toFixed(0);
      // iframe 의 _hkFps (HK_3dconfigurator 가 노출) 도 같이 표시.
      const cEl = document.getElementById('fpsCab');
      const hkFps = hkFrame.contentWindow && hkFrame.contentWindow._hkFps;
      if (cEl) cEl.textContent = (typeof hkFps === 'number' && hkFps > 0) ? hkFps.toFixed(0) : '--';
    } catch(e) {}
    // 어댑티브 락: FPS 너무 낮으면 영구 low, 회복되면 풀기
    if (_splatLastFps < 25 && !_splatAdaptiveLowLock) {
      _splatAdaptiveLowLock = true;
      console.log('[v78.129] splat FPS 낮음 (' + _splatLastFps.toFixed(1) + ') → 영구 low pixelRatio 락');
    } else if (_splatLastFps > 45 && _splatAdaptiveLowLock) {
      _splatAdaptiveLowLock = false;
      console.log('[v78.129] splat FPS 회복 (' + _splatLastFps.toFixed(1) + ') → 일반 모드 복귀');
    }
  }
  try {
    const hk = hkFrame.contentWindow;
    if (hk && hk.camera) {
      const hc = hk.camera;
      // === 카메라 움직임 감지 (위치 거리) ===
      const _moved = _splatLastPos.distanceToSquared(hc.position) > 0.00001;
      if (_moved) { _splatLastMoveT = now; _splatLastPos.copy(hc.position); }
      const _isMoving = (now - _splatLastMoveT) < 300;
      // === pixelRatio 결정: low lock > moving > idle ===
      const _targetDpr = _splatAdaptiveLowLock ? _SPLAT_DPR_LOW
                       : _isMoving ? _SPLAT_DPR_MOVING
                       : _SPLAT_DPR_IDLE;
      _splatSetDpr(_targetDpr);

      splatCamera.position.copy(hc.position);
      splatCamera.quaternion.copy(hc.quaternion);
      splatCamera.fov = hc.fov;
      splatCamera.aspect = hc.aspect;
      splatCamera.near = hc.near;
      splatCamera.far = hc.far;
      splatCamera.updateProjectionMatrix();
    }
  } catch(e) {}
  splatRenderer.render(splatScene, splatCamera);
}
animate();
console.log('[v78.129] Splat 렌더 루프 시작 (동적 품질: idle=' + _SPLAT_DPR_IDLE + ', moving=' + _SPLAT_DPR_MOVING + ', low=' + _SPLAT_DPR_LOW + ')');

window.splatScene = splatScene;
window.splatCamera = splatCamera;
window.splatRenderer = splatRenderer;
</script>
